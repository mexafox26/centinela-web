<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Cotización | Centinela AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="cotizar-page">
    <div class="radar-bg"></div>
    <div class="scan-line-global"></div>
    <div class="overlay-grid"></div>

    <div class="quote-container">
        <div class="glass-box form-card reveal active">
            <div class="brand">CENTINEL<span>AI</span></div>
            <h2 class="section-title">Solicitud de Cotización</h2>
            <p class="form-subtitle">Reciba una propuesta técnica personalizada vía WhatsApp.</p>
            
            <form id="quoteForm">
                <div class="input-group">
                    <label><i class="fas fa-user-tie"></i> Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-industry"></i> Empresa</label>
                    <input type="text" id="empresa" placeholder="Nombre de su industria" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-shield-alt"></i> Plan de Interés</label>
                    <select id="plan">
                        <option value="Vigilante (Software)">Vigilante (Solo Software)</option>
                        <option value="Comando (Integral)">Comando (Llave en mano)</option>
                        <option value="Consulta Personalizada">Consulta Personalizada</option>
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-comment-dots"></i> Mensaje / Requerimientos</label>
                    <textarea id="mensaje" rows="3" placeholder="Cuéntenos sobre su planta o necesidades específicas..."></textarea>
                </div>

                <button type="submit" class="p-btn quote-submit">
                    ENVIAR SOLICITUD <i class="fab fa-whatsapp"></i>
                </button>
            </form>
            
            <a href="index.html" class="back-link">← Volver al inicio</a>
        </div>
    </div>

    <script>
        document.getElementById('quoteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const empresa = document.getElementById('empresa').value;
            const plan = document.getElementById('plan').value;
            const mensaje = document.getElementById('mensaje').value;
            const telefono = "522204689180"; 
            
            const texto = `Hola Centinela AI, solicito una cotización:%0A%0A` +
                          `*Nombre:* ${nombre}%0A` +
                          `*Empresa:* ${empresa}%0A` +
                          `*Plan:* ${plan}%0A` +
                          `*Mensaje:* ${mensaje}`;
            
            const url = `https://wa.me/${telefono}?text=${texto}`;
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
