<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Centinela AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="payment-body">
    <div class="payment-container">
        <div class="text-box payment-card">
            <h2 class="section-title">Finalizar Adquisición</h2>
            <p id="plan-display">Plan seleccionado: <span>Cargando...</span></p>
            
            <form id="payment-form">
                <div class="form-group">
                    <label>Razón Social / Empresa</label>
                    <input type="text" placeholder="Ej. Manufacturas del Centro S.A." required>
                </div>
                <div class="form-group">
                    <label>RFC</label>
                    <input type="text" placeholder="ABC123456XYZ" required>
                </div>
                <div class="form-group">
                    <label>Número de Tarjeta</label>
                    <input type="text" placeholder="0000 0000 0000 0000" maxlength="16" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Vencimiento</label>
                        <input type="text" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" placeholder="***" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="btn-glow w-100">Confirmar Pago</button>
            </form>
            <a href="index.html" class="back-link">← Cancelar y volver</a>
        </div>
    </div>

    <script>
        // Capturar el plan de la URL
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan');
        document.querySelector('#plan-display span').innerText = plan || 'No seleccionado';
    </script>
</body>
</html>
